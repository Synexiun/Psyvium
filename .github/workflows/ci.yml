name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test & schema check
    runs-on: ubuntu-latest

    # Real Postgres so the Prisma schema is proven to apply, not just parse.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vpsy
          POSTGRES_PASSWORD: vpsy
          POSTGRES_DB: vpsy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vpsy -d vpsy"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://vpsy:vpsy@localhost:5432/vpsy?schema=public
      # CI-only throwaway secrets (must be >=16 chars — the API refuses to boot without them).
      JWT_ACCESS_SECRET: ci-only-access-secret-not-for-production
      JWT_REFRESH_SECRET: ci-only-refresh-secret-not-for-production
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — package.json's `packageManager` field is the single
      # source of truth (specifying both makes pnpm/action-setup fail with
      # "Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # ── Dependency audit ────────────────────────────────────────────────
      # High+critical findings fail the job. Use `pnpm audit --fix` + a
      # reviewed exceptions process if a transitive advisory has no fix yet.
      - name: "Dependency audit (high+critical — BLOCKING)"
        run: pnpm audit --audit-level high

      - name: Prisma generate
        run: pnpm --filter @vpsy/database exec prisma generate

      - name: Validate schema
        run: pnpm --filter @vpsy/database run validate

      # Real migration path (not `db push`) so RLS raw-SQL migrations and
      # partial unique indexes are actually installed in CI — Gate 0 audit.
      - name: "Apply migrations (prisma migrate deploy)"
        run: pnpm --filter @vpsy/database exec prisma migrate deploy

      - name: Seed
        run: pnpm --filter @vpsy/database run seed

      - name: Lint (api)
        run: pnpm --filter @vpsy/api run lint

      - name: Typecheck (api)
        run: pnpm --filter @vpsy/api run typecheck

      - name: Build (turbo — contracts → database → api + web)
        run: pnpm build

      # ── SAFETY GATE ──────────────────────────────────────────────────────
      # docs/technical/12-testing-strategy.md §6: the clinical-safety suite
      # encodes the platform's non-negotiable clinical promises (license/
      # credential gate, consent gate, human-only escalation resolution,
      # break-glass reason + time-box, safety-item crisis routing, and
      # national-analytics k-anonymity suppression) as a single named,
      # BLOCKING suite. It runs regardless of overall line coverage and must
      # pass for this build to be mergeable — a failure here is never
      # optional, even if the broader `Test` step below is green.
      - name: "Clinical-safety gate (BLOCKING — must pass to merge)"
        run: pnpm --filter @vpsy/api run test:safety

      - name: Test
        run: pnpm test

      # ── E2E (Playwright — BLOCKING) ──────────────────────────────────────
      # Closing web wave: the full suite (3 auth setups + journeys + the four
      # axe a11y scans) runs green end-to-end — 14 passed — after the
      # light-theme contrast token fix (72 serious color-contrast nodes → 0,
      # measured on the same build with the token floors toggled). Playwright's
      # webServer config boots the just-built API (`node dist/main.js` from
      # apps/api) and web (`next start`) against the Postgres service seeded
      # above, so no extra server wiring is needed here — only browsers.
      - name: Install Playwright browsers (chromium)
        run: pnpm --filter @vpsy/web exec playwright install --with-deps chromium

      - name: "E2E (apps/web — Playwright browser journeys + axe a11y; BLOCKING)"
        run: pnpm --filter @vpsy/web run test:e2e

  # ── Secret scan ──────────────────────────────────────────────────────────
  # docs/technical/10-observability-and-devops.md §4.1 / §14: a leaked secret
  # must block merge, full stop — independent job so it can't be skipped by
  # anything that happens (or fails) in build-test.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs history to scan the full diff/range, not just the tip commit

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: only needed for gitleaks' paid org features (e.g. the
          # hosted findings dashboard). Scanning itself runs without it; if
          # this secret isn't configured in the repo, the env var is simply
          # empty and the action falls back to its unlicensed OSS behavior.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Docker build proof ───────────────────────────────────────────────────
  # docs/technical/10-observability-and-devops.md §5: proves both images
  # still build clean on every PR (no push — this is a build-only smoke
  # check, not a release step; release/publish is a separate concern for a
  # later wave). Independent job so a Dockerfile regression is visible on
  # its own line rather than buried in — or blocking — the main test job.
  docker-build:
    name: Docker build proof (api + web, no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha,scope=vpsy-api
          cache-to: type=gha,mode=max,scope=vpsy-api

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          cache-from: type=gha,scope=vpsy-web
          cache-to: type=gha,mode=max,scope=vpsy-web
