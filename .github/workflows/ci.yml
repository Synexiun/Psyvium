name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test & schema check
    runs-on: ubuntu-latest

    # Real Postgres so the Prisma schema is proven to apply, not just parse.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vpsy
          POSTGRES_PASSWORD: vpsy
          POSTGRES_DB: vpsy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vpsy -d vpsy"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://vpsy:vpsy@localhost:5432/vpsy?schema=public
      # CI-only throwaway secrets (must be >=16 chars — the API refuses to boot without them).
      JWT_ACCESS_SECRET: ci-only-access-secret-not-for-production
      JWT_REFRESH_SECRET: ci-only-refresh-secret-not-for-production
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @vpsy/database exec prisma generate

      - name: Validate schema
        run: pnpm --filter @vpsy/database run validate

      - name: Apply schema to Postgres (proves migrations apply)
        run: pnpm --filter @vpsy/database exec prisma db push --skip-generate

      - name: Seed
        run: pnpm --filter @vpsy/database run seed

      - name: Lint (api)
        run: pnpm --filter @vpsy/api run lint

      - name: Typecheck (api)
        run: pnpm --filter @vpsy/api run typecheck

      - name: Build (turbo — contracts → database → api + web)
        run: pnpm build

      # ── SAFETY GATE ──────────────────────────────────────────────────────
      # docs/technical/12-testing-strategy.md §6: the clinical-safety suite
      # encodes the platform's non-negotiable clinical promises (license/
      # credential gate, consent gate, human-only escalation resolution,
      # break-glass reason + time-box, safety-item crisis routing, and
      # national-analytics k-anonymity suppression) as a single named,
      # BLOCKING suite. It runs regardless of overall line coverage and must
      # pass for this build to be mergeable — a failure here is never
      # optional, even if the broader `Test` step below is green.
      - name: "Clinical-safety gate (BLOCKING — must pass to merge)"
        run: pnpm --filter @vpsy/api run test:safety

      - name: Test
        run: pnpm test
