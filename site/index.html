<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#05060E">
<title>Psyvium — The Clinical Psychology Operating System</title>
<meta name="description" content="Psyvium: the operating system for clinical psychology — AI-assisted, clinician-decided. IRT/CAT psychometrics, evidence-based crisis care, in-house telehealth, country-scale compliance.">
<style>
/* ═══════════════ THE MIND, MAPPED — Psyvium marketing site ═══════════════
   A deliberate single-theme world: deep clinical night. Self-contained —
   no CDNs, no external fonts, hand-written WebGL. */
:root{
  --void:#05060E; --void-2:#0A0D1C; --panel:rgba(16,20,40,.55);
  --ink:#EDF1FF; --ink-2:#B9C2E8; --haze:#8B93B8; --line:rgba(139,147,184,.18);
  --pulse:#64F0D2; --neuro:#7C6CFF; --ember:#FFB454;
  --grad:linear-gradient(120deg,var(--neuro),var(--pulse));
  --disp:"Bahnschrift","Avenir Next Condensed","Segoe UI Variable Display",system-ui,sans-serif;
  --body:"Segoe UI Variable Text",-apple-system,"Segoe UI",system-ui,sans-serif;
  --mono:"Cascadia Mono","SF Mono",Consolas,monospace;
  --tabbar-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}
  .rise,.rise-l,.rise-r{transition:none!important;opacity:1!important;transform:none!important}
  .pulse-dot::before{animation:none!important}}
body{background:var(--void);color:var(--ink);font-family:var(--body);line-height:1.6;
  overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--neuro);color:#fff}
a{color:inherit;text-decoration:none}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

/* ── canvas cosmos ── */
#cosmos{position:fixed;inset:0;z-index:0;display:block}
.veil{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(120% 90% at 50% 0%,transparent 40%,var(--void) 100%)}

/* ── top bar ── */
.top{position:fixed;top:0;inset-inline:0;z-index:50;display:flex;align-items:center;
  justify-content:space-between;padding:14px clamp(16px,4vw,40px);
  background:linear-gradient(180deg,rgba(5,6,14,.85),transparent);backdrop-filter:blur(8px)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-size:19px;letter-spacing:.06em}
.brand b{color:var(--pulse)}
.brand .sig{width:26px;height:26px;border-radius:7px;background:var(--grad);
  display:grid;place-items:center;font-size:12px;color:#04121000;position:relative;overflow:hidden}
.brand .sig::after{content:"";position:absolute;inset:3px;border-radius:5px;background:var(--void)}
.brand .sig i{position:relative;z-index:1;width:10px;height:10px;border-radius:50%;
  background:var(--grad);display:block}
.topnav{display:flex;gap:26px;font-size:13.5px;color:var(--ink-2)}
.topnav a{position:relative;padding:4px 0;transition:color .25s}
.topnav a:hover,.topnav a:focus-visible{color:var(--ink)}
.topnav a::after{content:"";position:absolute;inset-inline:0;bottom:0;height:1.5px;background:var(--grad);
  transform:scaleX(0);transition:transform .3s;transform-origin:var(--tx-origin,left)}
.topnav a:hover::after{transform:scaleX(1)}
.lang{position:relative}
.lang select{appearance:none;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  font-family:var(--mono);font-size:12px;padding:7px 28px 7px 12px;border-radius:8px;cursor:pointer}
.lang::after{content:"▾";position:absolute;inset-inline-end:10px;top:50%;transform:translateY(-50%);
  color:var(--pulse);pointer-events:none;font-size:10px}
[dir="rtl"] .lang select{padding:7px 12px 7px 28px}

/* ── hero ── */
main{position:relative;z-index:2}
.hero{min-height:100svh;display:flex;flex-direction:column;justify-content:center;
  padding:96px clamp(18px,6vw,64px) 80px;max-width:1200px;margin-inline:auto}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--pulse);display:flex;align-items:center;gap:10px}
.pulse-dot{position:relative;width:8px;height:8px;border-radius:50%;background:var(--pulse)}
.pulse-dot::before{content:"";position:absolute;inset:-5px;border-radius:50%;border:1px solid var(--pulse);
  animation:ripple 2.2s ease-out infinite}
@keyframes ripple{0%{transform:scale(.4);opacity:.9}100%{transform:scale(1.8);opacity:0}}
h1{font-family:var(--disp);font-weight:650;font-size:clamp(40px,7.5vw,92px);line-height:1.02;
  letter-spacing:-.015em;margin-top:22px;max-width:13ch;text-wrap:balance}
.hero p.lede{margin-top:26px;font-size:clamp(16px,2vw,20px);color:var(--ink-2);max-width:56ch}
.hero-cta{margin-top:40px;display:flex;gap:16px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--disp);font-size:15px;
  letter-spacing:.04em;padding:15px 30px;border-radius:14px;cursor:pointer;border:0;
  transition:transform .25s cubic-bezier(.2,.9,.3,1.4),box-shadow .25s;will-change:transform}
.btn-primary{background:var(--grad);color:#071018;box-shadow:0 8px 30px -8px rgba(100,240,210,.45)}
.btn-primary:hover{box-shadow:0 12px 44px -8px rgba(124,108,255,.6)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--pulse)}
.hero-stats{margin-top:64px;display:flex;gap:clamp(24px,5vw,64px);flex-wrap:wrap}
.stat .v{font-family:var(--mono);font-size:clamp(26px,3.4vw,40px);font-weight:600;color:var(--ink)}
.stat .v em{font-style:normal;color:var(--pulse)}
.stat .k{font-size:12px;color:var(--haze);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.scroll-hint{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);color:var(--haze);
  font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  writing-mode:vertical-rl;opacity:.7}

/* ── sections ── */
section{position:relative;padding:clamp(72px,10vw,130px) clamp(18px,6vw,64px);max-width:1200px;margin-inline:auto}
.sec-head{max-width:760px}
.sec-head .eyebrow{color:var(--neuro)}
h2{font-family:var(--disp);font-weight:640;font-size:clamp(30px,4.6vw,54px);line-height:1.08;
  letter-spacing:-.01em;margin-top:16px;text-wrap:balance}
.sec-head p{margin-top:18px;color:var(--ink-2);font-size:clamp(15px,1.6vw,17.5px)}

/* layer cards — the six-layer stack */
.layers{margin-top:56px;display:grid;gap:14px}
.layer{display:grid;grid-template-columns:56px 1fr auto;gap:22px;align-items:center;
  padding:26px 28px;border:1px solid var(--line);border-radius:18px;background:var(--panel);
  backdrop-filter:blur(14px);transition:transform .35s,border-color .35s;position:relative;overflow:hidden}
.layer::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:2px;
  background:var(--grad);opacity:0;transition:opacity .35s}
.layer:hover{transform:translateX(6px);border-color:rgba(124,108,255,.5)}
[dir="rtl"] .layer:hover{transform:translateX(-6px)}
.layer:hover::before{opacity:1}
.layer .n{font-family:var(--mono);font-size:24px;color:var(--neuro);opacity:.85}
.layer h3{font-family:var(--disp);font-size:19px;letter-spacing:.02em}
.layer p{color:var(--haze);font-size:14px;margin-top:4px;max-width:62ch}
.layer .tag{font-family:var(--mono);font-size:10.5px;color:var(--pulse);border:1px solid rgba(100,240,210,.3);
  padding:4px 10px;border-radius:20px;white-space:nowrap}

/* intelligence grid */
.grid3{margin-top:56px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
.cardx{padding:30px;border:1px solid var(--line);border-radius:20px;background:var(--panel);
  backdrop-filter:blur(14px);position:relative;overflow:hidden;transition:transform .4s,box-shadow .4s}
.cardx:hover{transform:translateY(-6px);box-shadow:0 24px 60px -24px rgba(124,108,255,.35)}
.cardx .ico{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(124,108,255,.2),rgba(100,240,210,.2));
  display:grid;place-items:center;margin-bottom:18px}
.cardx .ico svg{width:22px;height:22px;stroke:var(--pulse);fill:none;stroke-width:1.6}
.cardx h3{font-family:var(--disp);font-size:18px;margin-bottom:8px}
.cardx p{color:var(--haze);font-size:14px}
.cardx .foot{margin-top:16px;font-family:var(--mono);font-size:11px;color:var(--neuro)}

/* evidence strip */
.evidence{margin-top:56px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1px;
  background:var(--line);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.ev{background:var(--void-2);padding:26px}
.ev .src{font-family:var(--mono);font-size:10.5px;color:var(--ember);letter-spacing:.1em;text-transform:uppercase}
.ev h4{font-family:var(--disp);font-size:16px;margin-top:10px}
.ev p{font-size:13px;color:var(--haze);margin-top:6px}

/* trust / security */
.trust{margin-top:56px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px}
.trust .t{padding:24px;border:1px solid var(--line);border-radius:16px;background:var(--panel)}
.trust .t b{font-family:var(--mono);font-size:12px;color:var(--pulse);letter-spacing:.08em;display:block;margin-bottom:8px}
.trust .t span{font-size:13.5px;color:var(--ink-2)}

/* languages ribbon */
.langs{margin-top:48px;display:flex;flex-wrap:wrap;gap:10px}
.langs span{font-family:var(--mono);font-size:12px;padding:8px 16px;border:1px solid var(--line);
  border-radius:30px;color:var(--ink-2);transition:border-color .3s,color .3s;cursor:default}
.langs span:hover{border-color:var(--pulse);color:var(--pulse)}

/* CTA */
.ctasec{text-align:center;padding-bottom:calc(clamp(72px,10vw,130px) + var(--tabbar-h))}
.ctasec .orb{width:120px;height:120px;margin:0 auto 34px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 35% 30%,rgba(124,108,255,.8),rgba(100,240,210,.25) 60%,transparent 75%);
  filter:blur(1px);animation:breathe 5s ease-in-out infinite}
@keyframes breathe{50%{transform:scale(1.08);filter:blur(0)}}
.ctasec h2{margin-inline:auto}
.ctasec .lede{margin:18px auto 0;max-width:52ch;color:var(--ink-2)}

/* footer */
footer{position:relative;z-index:2;border-top:1px solid var(--line);padding:40px clamp(18px,6vw,64px) calc(36px + var(--tabbar-h));
  display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;color:var(--haze);font-size:12.5px;
  max-width:1200px;margin-inline:auto}
footer .mono{color:var(--ink-2)}

/* reveal animations */
.rise,.rise-l,.rise-r{opacity:0;transform:translateY(34px);transition:opacity .8s ease,transform .8s cubic-bezier(.2,.7,.2,1)}
.rise-l{transform:translateX(-40px)}.rise-r{transform:translateX(40px)}
[dir="rtl"] .rise-l{transform:translateX(40px)}[dir="rtl"] .rise-r{transform:translateX(-40px)}
.in{opacity:1;transform:none}

/* ── native-app mobile shell ── */
.tabbar{display:none}
@media (max-width:820px){
  .topnav{display:none}
  .hero{padding-top:110px}
  .tabbar{display:grid;grid-template-columns:repeat(5,1fr);position:fixed;bottom:0;inset-inline:0;z-index:60;
    height:calc(var(--tabbar-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
    background:rgba(8,10,22,.82);backdrop-filter:blur(20px) saturate(1.4);border-top:1px solid var(--line)}
  .tabbar a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--haze);font-size:10px;letter-spacing:.02em;transition:color .25s;position:relative}
  .tabbar a svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;transition:transform .3s}
  .tabbar a.on{color:var(--pulse)}
  .tabbar a.on svg{transform:translateY(-2px) scale(1.08)}
  .tabbar a.on::after{content:"";position:absolute;top:0;width:26px;height:2.5px;border-radius:2px;background:var(--grad)}
  .layer{grid-template-columns:40px 1fr}
  .layer .tag{display:none}
}
@media (min-width:821px){body{--tabbar-h:0px}}
</style>
</head>
<body>
<canvas id="cosmos" aria-hidden="true"></canvas>
<div class="veil"></div>

<header class="top">
  <a class="brand" href="#top" aria-label="Psyvium"><span class="sig"><i></i></span>Psy<b>vium</b></a>
  <nav class="topnav" aria-label="primary">
    <a href="#platform" data-i18n="nav.platform"></a>
    <a href="#intelligence" data-i18n="nav.intelligence"></a>
    <a href="#evidence" data-i18n="nav.evidence"></a>
    <a href="#trust" data-i18n="nav.trust"></a>
    <a href="#start" data-i18n="nav.start"></a>
  </nav>
  <div class="lang"><select id="langsel" aria-label="Language"></select></div>
</header>

<main id="top">
  <!-- HERO -->
  <div class="hero">
    <div class="eyebrow"><span class="pulse-dot"></span><span data-i18n="hero.eyebrow"></span></div>
    <h1><span data-i18n="hero.title1"></span> <span class="grad-text" data-i18n="hero.title2"></span></h1>
    <p class="lede" data-i18n="hero.lede"></p>
    <div class="hero-cta">
      <a class="btn btn-primary magnetic" href="#start" data-i18n="hero.cta1"></a>
      <a class="btn btn-ghost magnetic" href="#platform" data-i18n="hero.cta2"></a>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="v"><em data-count="30">0</em>/30</div><div class="k" data-i18n="stats.contexts"></div></div>
      <div class="stat"><div class="v"><em data-count="8">0</em>/8</div><div class="k" data-i18n="stats.agents"></div></div>
      <div class="stat"><div class="v"><em data-count="11">0</em></div><div class="k" data-i18n="stats.langs"></div></div>
      <div class="stat"><div class="v"><em data-count="476">0</em></div><div class="k" data-i18n="stats.tests"></div></div>
    </div>
    <div class="scroll-hint mono" data-i18n="hero.scroll"></div>
  </div>

  <!-- PLATFORM: six layers -->
  <section id="platform">
    <div class="sec-head rise">
      <div class="eyebrow"><span data-i18n="plat.eyebrow"></span></div>
      <h2 data-i18n="plat.title"></h2>
      <p data-i18n="plat.lede"></p>
    </div>
    <div class="layers">
      <div class="layer rise"><div class="n mono">01</div><div><h3 data-i18n="plat.l1t"></h3><p data-i18n="plat.l1d"></p></div><span class="tag" data-i18n="plat.l1g"></span></div>
      <div class="layer rise"><div class="n mono">02</div><div><h3 data-i18n="plat.l2t"></h3><p data-i18n="plat.l2d"></p></div><span class="tag" data-i18n="plat.l2g"></span></div>
      <div class="layer rise"><div class="n mono">03</div><div><h3 data-i18n="plat.l3t"></h3><p data-i18n="plat.l3d"></p></div><span class="tag" data-i18n="plat.l3g"></span></div>
      <div class="layer rise"><div class="n mono">04</div><div><h3 data-i18n="plat.l4t"></h3><p data-i18n="plat.l4d"></p></div><span class="tag" data-i18n="plat.l4g"></span></div>
      <div class="layer rise"><div class="n mono">05</div><div><h3 data-i18n="plat.l5t"></h3><p data-i18n="plat.l5d"></p></div><span class="tag" data-i18n="plat.l5g"></span></div>
      <div class="layer rise"><div class="n mono">06</div><div><h3 data-i18n="plat.l6t"></h3><p data-i18n="plat.l6d"></p></div><span class="tag" data-i18n="plat.l6g"></span></div>
    </div>
  </section>

  <!-- INTELLIGENCE -->
  <section id="intelligence">
    <div class="sec-head rise">
      <div class="eyebrow"><span data-i18n="ai.eyebrow"></span></div>
      <h2 data-i18n="ai.title"></h2>
      <p data-i18n="ai.lede"></p>
    </div>
    <div class="grid3">
      <div class="cardx rise"><div class="ico"><svg viewBox="0 0 24 24"><path d="M12 3v3m0 12v3M3 12h3m12 0h3M6 6l2 2m8 8 2 2m0-12-2 2M8 16l-2 2" stroke-linecap="round"/><circle cx="12" cy="12" r="3.5"/></svg></div>
        <h3 data-i18n="ai.c1t"></h3><p data-i18n="ai.c1d"></p><div class="foot mono" data-i18n="ai.c1f"></div></div>
      <div class="cardx rise"><div class="ico"><svg viewBox="0 0 24 24"><path d="M4 19V5m0 10 5-4 4 3 7-8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h3 data-i18n="ai.c2t"></h3><p data-i18n="ai.c2d"></p><div class="foot mono" data-i18n="ai.c2f"></div></div>
      <div class="cardx rise"><div class="ico"><svg viewBox="0 0 24 24"><path d="M12 3l7 4v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V7z" stroke-linejoin="round"/><path d="M9.5 12l2 2 3.5-4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h3 data-i18n="ai.c3t"></h3><p data-i18n="ai.c3d"></p><div class="foot mono" data-i18n="ai.c3f"></div></div>
    </div>
  </section>

  <!-- EVIDENCE -->
  <section id="evidence">
    <div class="sec-head rise">
      <div class="eyebrow"><span data-i18n="ev.eyebrow"></span></div>
      <h2 data-i18n="ev.title"></h2>
      <p data-i18n="ev.lede"></p>
    </div>
    <div class="evidence rise">
      <div class="ev"><div class="src">C-SSRS · Zero Suicide</div><h4 data-i18n="ev.e1t"></h4><p data-i18n="ev.e1d"></p></div>
      <div class="ev"><div class="src">Stanley &amp; Brown 2012</div><h4 data-i18n="ev.e2t"></h4><p data-i18n="ev.e2d"></p></div>
      <div class="ev"><div class="src">AERA · APA · NCME</div><h4 data-i18n="ev.e3t"></h4><p data-i18n="ev.e3d"></p></div>
      <div class="ev"><div class="src">Jacobson &amp; Truax 1991</div><h4 data-i18n="ev.e4t"></h4><p data-i18n="ev.e4d"></p></div>
    </div>
  </section>

  <!-- TRUST -->
  <section id="trust">
    <div class="sec-head rise">
      <div class="eyebrow"><span data-i18n="tr.eyebrow"></span></div>
      <h2 data-i18n="tr.title"></h2>
      <p data-i18n="tr.lede"></p>
    </div>
    <div class="trust">
      <div class="t rise"><b data-i18n="tr.t1b"></b><span data-i18n="tr.t1s"></span></div>
      <div class="t rise"><b data-i18n="tr.t2b"></b><span data-i18n="tr.t2s"></span></div>
      <div class="t rise"><b data-i18n="tr.t3b"></b><span data-i18n="tr.t3s"></span></div>
      <div class="t rise"><b data-i18n="tr.t4b"></b><span data-i18n="tr.t4s"></span></div>
    </div>
    <div class="langs rise" id="langribbon"></div>
  </section>

  <!-- CTA -->
  <section id="start" class="ctasec">
    <div class="orb rise" aria-hidden="true"></div>
    <h2 class="rise"><span data-i18n="cta.title1"></span> <span class="grad-text" data-i18n="cta.title2"></span></h2>
    <p class="lede rise" data-i18n="cta.lede"></p>
    <div class="hero-cta rise" style="justify-content:center">
      <a class="btn btn-primary magnetic" href="mailto:hello@vpsy.health" data-i18n="cta.btn"></a>
    </div>
  </section>
</main>

<footer>
  <div><span class="mono">Psyvium</span> — <span data-i18n="foot.tag"></span></div>
  <div class="mono" data-i18n="foot.principle"></div>
</footer>

<!-- native-app bottom tab bar (mobile) -->
<nav class="tabbar" aria-label="mobile">
  <a href="#top" data-sec="top"><svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7v9a1 1 0 01-1 1h-5v-6h-4v6H5a1 1 0 01-1-1z" stroke-linejoin="round"/></svg><span data-i18n="tab.home"></span></a>
  <a href="#platform" data-sec="platform"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10" stroke-linecap="round"/></svg><span data-i18n="tab.platform"></span></a>
  <a href="#intelligence" data-sec="intelligence"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5"/><path d="M12 3v3m0 12v3M3 12h3m12 0h3" stroke-linecap="round"/></svg><span data-i18n="tab.ai"></span></a>
  <a href="#trust" data-sec="trust"><svg viewBox="0 0 24 24"><path d="M12 3l7 4v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V7z" stroke-linejoin="round"/></svg><span data-i18n="tab.trust"></span></a>
  <a href="#start" data-sec="start"><svg viewBox="0 0 24 24"><path d="M5 12h14m-6-6 6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg><span data-i18n="tab.start"></span></a>
</nav>

<script>
/* ═════════ i18n — 11 languages, all fully translated (fa + ar are RTL) ═════════ */

"hero.eyebrow":"نظام التشغيل لعلم النفس السريري","hero.title1":"العقل،","hero.title2":"مُخرَّطًا.",
"hero.lede":"Psyvium هو نظام التشغيل لعلم النفس السريري على مستوى وطني — من الاستقبال إلى النتيجة، ومن القياس النفسي إلى الرواتب. الذكاء الاصطناعي يساعد في كل خطوة، والأخصائيون المرخَّصون يقررون في كل واحدة.",

"plat.eyebrow":"منصّة واحدة · ست طبقات","plat.title":"كل ما تحتاجه شبكة سريرية للعمل.","plat.lede":"ليس تطبيق علاج، بل نظام تشغيل متكامل: السجلات السريرية، القياس النفسي التكيّفي، الاستجابة للأزمات، الرعاية عن بُعد، الاتصالات، ومحرّك الأعمال — وتحت كل ذلك سجلّ تدقيق غير قابل للتلاعب.",
"plat.l1t":"النواة السريرية","plat.l1d":"استقبال مشروط بالموافقة، فرز، مطابقة مرتَّبة بالذكاء الاصطناعي مع موافقة نهائية من المدير، ملاحظات قابلة للتوقيع بخيط سريري ذهبي، وخطط علاج SMART.","plat.l1g":"سجل صحي",

"ai.eyebrow":"ذكاء مُحوكَم","ai.title":"الذكاء الاصطناعي يساعد. والأخصائي يقرر.","ai.lede":"ثمانية وكلاء سريريين — ملخصات الاستقبال، اتجاهات تشخيصية تفريقية، هياكل ملاحظات، مقترحات خطط، وسرد للنتائج — كلهم مشروطون بالموافقة، بحد أدنى من البيانات الصحية، وخلف قرار بشري دائمًا.",

"ev.eyebrow":"مبني على الأدبيات العلمية","ev.title":"قابل للدفاع سريريًا، سطرًا بسطر.","ev.lede":"دُقّق كل مسار سريري مقابل الأدلة المنشورة وأُعيد بناؤه وفقها — والاستشهادات موجودة في الشيفرة.",

"ev.e2t":"خطط أمان مكتملة","ev.e2d":"الخطوات الست كلها — بما فيها تقييد الوسائل المنظَّم — تُبنى بالتشارك، وتبقى بيد المريض، مع توثيق الإقرار.",

gl.bindBuffer(gl.ARRAY_BUFFER,bufH);gl.bufferData(gl.ARRAY_BUFFER,hue,gl.STATIC_DRAW);
const NEURO=[124/255,108/255,1.0], PULSE=[100/255,240/255,210/255];
let mx=0,my=0,tx=0,ty=0,scroll=0;
addEventListener('pointermove',e=>{tx=(e.clientX/innerWidth-0.5)*2;ty=(e.clientY/innerHeight-0.5)*2},{passive:true});
addEventListener('scroll',()=>{scroll=scrollY/Math.max(1,document.body.scrollHeight-innerHeight)},{passive:true});
gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
const lineV=new Float32Array(links.length*3), lineW=new Float32Array(links.length);
for(let k=0;k<links.length;k++)lineW[k]=hue[links[k]];
const puV=new Float32Array(PULSES*3), puH=new Float32Array(PULSES).fill(0.95);
let t0=performance.now();
function frame(now){
  const t=(now-t0)/1000;
  mx+=(tx-mx)*0.04; my+=(ty-my)*0.04;
  const ry=t*(reduced?0.008:0.05)+mx*0.35, rx=my*0.22+scroll*0.9-0.1;
  const cy=Math.cos(ry),sy=Math.sin(ry),cx=Math.cos(rx),sx=Math.sin(rx);
  const asp=H/W, Z=0.62+scroll*0.25;
  /* column-major: rotY then rotX then scale/aspect; z into [0..~1] for depth fade */
  const M=new Float32Array([cy*Z*asp,sx*sy*Z,cx*sy*0.5,0,  0,cx*Z,-sx*0.5,0,  -sy*Z*asp,sx*cy*Z,cx*cy*0.5,0,  0,0,0.5,1]);
  gl.clearColor(0.0196,0.0235,0.055,1);gl.clear(gl.COLOR_BUFFER_BIT);
  /* subtle organic drift */
  const drift=new Float32Array(pos.length);
  for(let i=0;i<N;i++){const b=i*3, w=t*0.5+i;
    drift[b]=pos[b]+Math.sin(w*0.7)*0.012; drift[b+1]=pos[b+1]+Math.cos(w*0.9)*0.012; drift[b+2]=pos[b+2]+Math.sin(w*1.1)*0.012;}
  for(let k=0;k<links.length;k++){const s=links[k]*3,d3=k*3;lineV[d3]=drift[s];lineV[d3+1]=drift[s+1];lineV[d3+2]=drift[s+2];}
  /* lines */
  gl.useProgram(PL);
  gl.uniformMatrix4fv(gl.getUniformLocation(PL,'M'),false,M);
  gl.uniform3fv(gl.getUniformLocation(PL,'A'),NEURO);gl.uniform3fv(gl.getUniformLocation(PL,'B'),PULSE);
  gl.uniform1f(gl.getUniformLocation(PL,'O'),0.22);
  gl.bindBuffer(gl.ARRAY_BUFFER,bufL);gl.bufferData(gl.ARRAY_BUFFER,lineV,gl.DYNAMIC_DRAW);
  let a=gl.getAttribLocation(PL,'p');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,bufW);gl.bufferData(gl.ARRAY_BUFFER,lineW,gl.STATIC_DRAW);
  a=gl.getAttribLocation(PL,'w');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,1,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.LINES,0,links.length);
  /* neurons */
  gl.useProgram(PP);
  gl.uniformMatrix4fv(gl.getUniformLocation(PP,'M'),false,M);
  gl.uniform3fv(gl.getUniformLocation(PP,'A'),NEURO);gl.uniform3fv(gl.getUniformLocation(PP,'B'),PULSE);
  gl.uniform1f(gl.getUniformLocation(PP,'O'),0.85);gl.uniform1f(gl.getUniformLocation(PP,'S'),3.2*DPR);
  gl.bindBuffer(gl.ARRAY_BUFFER,bufP);gl.bufferData(gl.ARRAY_BUFFER,drift,gl.DYNAMIC_DRAW);
  a=gl.getAttribLocation(PP,'p');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,bufH);
  a=gl.getAttribLocation(PP,'h');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,1,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.POINTS,0,N);
  /* signal pulses traveling links */
  if(!reduced){
    for(let i=0;i<PULSES;i++){const p=pulse[i];p.t+=p.v/60;if(p.t>1){p.t=0;p.e=(Math.random()*links.length/2|0)*2}
      const s=links[p.e]*3,e=links[p.e+1]*3,u=p.t,b=i*3;
      puV[b]=drift[s]+(drift[e]-drift[s])*u;puV[b+1]=drift[s+1]+(drift[e+1]-drift[s+1])*u;puV[b+2]=drift[s+2]+(drift[e+2]-drift[s+2])*u;}
    gl.uniform1f(gl.getUniformLocation(PP,'O'),1.0);gl.uniform1f(gl.getUniformLocation(PP,'S'),5.5*DPR);
    gl.bindBuffer(gl.ARRAY_BUFFER,bufPu);gl.bufferData(gl.ARRAY_BUFFER,puV,gl.DYNAMIC_DRAW);
    a=gl.getAttribLocation(PP,'p');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,bufPh);gl.bufferData(gl.ARRAY_BUFFER,puH,gl.STATIC_DRAW);
    a=gl.getAttribLocation(PP,'h');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,1,gl.FLOAT,false,0,0);
    gl.drawArrays(gl.POINTS,0,PULSES);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();

/* ═════════ scroll reveals, count-ups, tab highlighting, magnetic buttons ═════════ */
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:0.15});
document.querySelectorAll('.rise,.rise-l,.rise-r').forEach(el=>io.observe(el));

/* count-up stats */
const cio=new IntersectionObserver(es=>es.forEach(e=>{if(!e.isIntersecting)return;cio.unobserve(e.target);
  const el=e.target,to=+el.dataset.count,t0=performance.now();
  (function tick(n){const p=Math.min(1,(n-t0)/1400),v=Math.round(to*(1-Math.pow(1-p,3)));el.textContent=v;
    if(p<1)requestAnimationFrame(tick)})(t0);}),{threshold:0.6});
document.querySelectorAll('[data-count]').forEach(el=>cio.observe(el));

/* active tab on mobile */
const secs=['top','platform','intelligence','trust','start'].map(id=>document.getElementById(id)).filter(Boolean);
const tabs=[...document.querySelectorAll('.tabbar a')];
const sio=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){
  tabs.forEach(t=>t.classList.toggle('on',t.dataset.sec===e.target.id))}})},{rootMargin:'-40% 0px -50% 0px'});
secs.forEach(s=>sio.observe(s));

/* magnetic buttons (desktop, motion-safe) */
if(matchMedia('(pointer:fine)').matches && !matchMedia('(prefers-reduced-motion: reduce)').matches){
  document.querySelectorAll('.magnetic').forEach(b=>{
    b.addEventListener('pointermove',e=>{const r=b.getBoundingClientRect();
      b.style.transform=`translate(${(e.clientX-r.left-r.width/2)*0.18}px,${(e.clientY-r.top-r.height/2)*0.3}px)`});
    b.addEventListener('pointerleave',()=>b.style.transform='');
  });
}
</script>
</body>
</html>
